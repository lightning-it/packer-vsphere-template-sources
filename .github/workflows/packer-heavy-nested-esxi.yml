---
name: Packer Heavy Nested ESXi

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:
    inputs:
      build_kind:
        description: "Build kind: rhel or ubuntu"
        required: true
        default: rhel
      build_version:
        description: "RHEL major or Ubuntu release"
        required: true
        default: "8"

permissions:
  contents: read

concurrency:
  group: packer-heavy-nested-esxi
  cancel-in-progress: false

jobs:
  build:
    name: Build source image on nested ESXi
    timeout-minutes: 180
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.head_ref == 'develop' &&
        github.base_ref == 'main' &&
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on:
      - self-hosted
      - linux
      - x64
      - ubuntu
      - incus
      - nested-virt

    steps:
      - name: Checkout packer-vsphere-template-sources
        uses: actions/checkout@v6

      - name: Checkout supplementary collection
        uses: actions/checkout@v6
        with:
          repository: lightning-it/ansible-collection-supplementary
          ref: develop
          path: collections/ansible_collections/lit/supplementary

      - name: Prepare Ansible runtime
        run: |
          set -euo pipefail
          if ! command -v ansible-playbook >/dev/null 2>&1; then
            python3 -m pip install --user "ansible-core==2.18.14"
            echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          fi

      - name: Run nested ESXi Packer build
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections
          PACKER_REPO_DIR: .
          PACKER_SOURCE_BRANCH: ${{ github.head_ref || github.ref_name }}
          PACKER_TARGET_BRANCH: ${{ github.base_ref || 'main' }}
          PACKER_BUILD_KIND: ${{ inputs.build_kind || 'rhel' }}
          PACKER_BUILD_VERSION: ${{ inputs.build_version || '8' }}
          NESTED_ESXI_INCUS_IMAGE: ${{ vars.PACKER_NESTED_ESXI_INCUS_IMAGE }}
          NESTED_ESXI_ENDPOINT: ${{ vars.PACKER_NESTED_ESXI_ENDPOINT }}
          NESTED_ESXI_USERNAME: ${{ secrets.PACKER_NESTED_ESXI_USERNAME }}
          NESTED_ESXI_PASSWORD: ${{ secrets.PACKER_NESTED_ESXI_PASSWORD }}
          NESTED_ESXI_CPU: ${{ vars.PACKER_NESTED_ESXI_CPU || '8' }}
          NESTED_ESXI_MEMORY: ${{ vars.PACKER_NESTED_ESXI_MEMORY || '32GiB' }}
          NESTED_ESXI_ROOT_DISK_SIZE: ${{ vars.PACKER_NESTED_ESXI_ROOT_DISK_SIZE }}
          NESTED_ESXI_RAW_QEMU: ${{ vars.PACKER_NESTED_ESXI_RAW_QEMU }}
          NESTED_ESXI_DATASTORE: ${{ vars.PACKER_NESTED_ESXI_DATASTORE || 'datastore1' }}
          NESTED_ESXI_NETWORK: ${{ vars.PACKER_NESTED_ESXI_NETWORK || 'VM Network' }}
          RHEL8_ISO_PATH: ${{ vars.PACKER_RHEL8_ISO_PATH }}
          RHEL8_ISO_CHECKSUM: ${{ vars.PACKER_RHEL8_ISO_CHECKSUM }}
          RHEL9_ISO_PATH: ${{ vars.PACKER_RHEL9_ISO_PATH }}
          RHEL9_ISO_CHECKSUM: ${{ vars.PACKER_RHEL9_ISO_CHECKSUM }}
          RHEL10_ISO_PATH: ${{ vars.PACKER_RHEL10_ISO_PATH }}
          RHEL10_ISO_CHECKSUM: ${{ vars.PACKER_RHEL10_ISO_CHECKSUM }}
          UBUNTU2404_ISO_PATH: ${{ vars.PACKER_UBUNTU2404_ISO_PATH }}
          UBUNTU2404_ISO_CHECKSUM: ${{ vars.PACKER_UBUNTU2404_ISO_CHECKSUM }}
          UBUNTU2604_ISO_PATH: ${{ vars.PACKER_UBUNTU2604_ISO_PATH }}
          UBUNTU2604_ISO_CHECKSUM: ${{ vars.PACKER_UBUNTU2604_ISO_CHECKSUM }}
          INSTALLER_USERNAME: ${{ vars.PACKER_INSTALLER_USERNAME || 'breakglass' }}
          INSTALLER_PASSWORD: ${{ secrets.PACKER_INSTALLER_PASSWORD }}
          INSTALLER_PASSWORD_HASH: ${{ secrets.PACKER_INSTALLER_PASSWORD_HASH }}
        run: |
          set -euo pipefail
          bash .github/scripts/packer-nested-esxi-heavy-build.sh

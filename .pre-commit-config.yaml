---
repos:
  - repo: local
    hooks:
      - id: packer-test-suite
        name: Packer test suite
        language: system
        entry: scripts/test-packer.sh
        pass_filenames: false
        files: >-
          ^(packer\.pkr\.hcl|shared\.pkr\.hcl|rhel\.pkr\.hcl|ubuntu\.pkr\.hcl|variables\.pkr\.hcl|vars/example\.pkrvars\.hcl|http/|scripts/(build-rhel|build-ubuntu|test-packer|test-packer-heavy)\.sh|\.github/(scripts|workflows)/)

      - id: packer-heavy-build
        name: Packer heavy vSphere build
        language: system
        entry: scripts/test-packer-heavy.sh
        pass_filenames: false
        stages:
          - manual
        files: >-
          ^(packer\.pkr\.hcl|shared\.pkr\.hcl|rhel\.pkr\.hcl|ubuntu\.pkr\.hcl|variables\.pkr\.hcl|vars/example\.pkrvars\.hcl|http/|scripts/(build-rhel|build-ubuntu|test-packer|test-packer-heavy)\.sh|\.github/(scripts|workflows)/)
